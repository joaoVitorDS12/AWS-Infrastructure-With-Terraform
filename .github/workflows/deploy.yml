name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/html/aws-project-training || git clone https://github.com/joaoVitorDS12/aws-project-training.git /var/www/html/aws-project-training
            git config --global --add safe.directory /var/www/html/aws-project-training
            cd /var/www/html/aws-project-training
            git pull origin main
            sudo cp app/index.html /var/www/html/index.html
            sudo systemctl restart httpd
